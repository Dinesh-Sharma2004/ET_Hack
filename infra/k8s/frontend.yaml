apiVersion: apps/v1
kind: Deployment
metadata:
  name: myet-frontend
  namespace: myet-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myet-frontend
  template:
    metadata:
      labels:
        app: myet-frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/dinesh-sharma2004/myet-web:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: myet-frontend
  namespace: myet-ai
spec:
  selector:
    app: myet-frontend
  ports:
    - port: 80
      targetPort: 5173
