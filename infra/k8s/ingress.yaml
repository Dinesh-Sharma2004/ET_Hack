apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myet-ingress
  namespace: myet-ai
spec:
  rules:
    - host: myet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myet-frontend
                port:
                  number: 80
    - host: api.myet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myet-api
                port:
                  number: 8000
